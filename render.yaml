services:
  - type: web
    name: agentforge-server
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: BASE_RPC_URL
        sync: false
      - key: REGISTRY_ADDRESS
        sync: false
      - key: COMMERCE_ADDRESS
        sync: false
      - key: VAULT_ADDRESS
        sync: false
      - key: EXECUTOR_ADDRESS
        sync: false
      - key: DEPLOY_BLOCK
        value: "0"
      - key: DASHBOARD_URL
        sync: false
      - key: DEMO_MARKET_ADDRESS
        sync: false
      - key: CHAIN_ID
        value: "84532"
